<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Disponibles - Exam Tracker</title>
<link rel="stylesheet" href="/assets/css/availability.css">
<script src="/vendor/html2canvas.min.js"></script>
<script src="/vendor/jspdf.umd.min.js"></script>
<script src="/lib/examSession.js"></script>
<script src="/lib/status.js"></script>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a class="back-link" href="/" title="Retour au tableau de bord">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Tableau de bord
    </a>
    <a class="back-link" href="/contacts/" title="Gestion des contacts" style="margin-left:4px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Contacts
    </a>
    <div class="filters">
      <label for="fYear">Annee</label>
      <select id="fYear" onchange="onFilterChange()"></select>
      <label for="fWilaya">Wilaya</label>
      <select id="fWilaya" onchange="onFilterChange()"></select>
      <label for="fPngScale">Echelle PNG</label>
      <select id="fPngScale" onchange="onPngScaleChange()" title="Resolution de l'export PNG">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
      </select>
      <label for="fPngBg">Fond PNG</label>
      <select id="fPngBg" onchange="onPngBgChange()" title="Fond de l'export PNG">
        <option value="gradient">Degrade</option>
        <option value="transparent">Transparent</option>
      </select>
      <button type="button" id="refreshStatusBtn" class="export-btn status" onclick="refreshAvailabilityStatuses()" title="Refresh workflow statuses in the sheet">
        <span id="refreshStatusBtnText">Refresh Status</span>
      </button>
      <button type="button" id="exportBtn" class="export-btn" onclick="exportAsImage()" title="Exporter en image PNG">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="exportBtnText">PNG</span>
      </button>
      <label for="pdfPageSize">Format</label>
      <select id="pdfPageSize" onchange="onPdfPrefsChange()" title="Format de page PDF">
        <option value="a4">A4</option>
        <option value="letter">Letter</option>
      </select>
      <label for="pdfOrientation">Orient.</label>
      <select id="pdfOrientation" onchange="onPdfPrefsChange()" title="Orientation PDF">
        <option value="auto">Auto</option>
        <option value="landscape">Paysage</option>
        <option value="portrait">Portrait</option>
      </select>
      <button type="button" id="exportPdfBtn" class="export-btn pdf" onclick="exportAsPdf()" title="Exporter en PDF">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="exportPdfBtnText">PDF</span>
      </button>
    </div>
  </div>

  <div class="title-banner">
    <h1 id="pageTitle">QCM - Maintenant Disponibles sur la Plateforme</h1>
  </div>

  <div id="loading" class="state-msg">
    <div class="spinner"></div>
    Chargement des donnees...
  </div>
  <div id="errorBox" class="state-msg" style="display:none;">
    Impossible de charger les donnees.
    <div id="errorDetails" style="margin-top:8px;font-size:12px;opacity:0.75;"></div>
  </div>

  <div id="cardsGrid" class="cards-grid" style="display:none;"></div>

  <div class="footer-note">
    Chaque bouton represente un examen lie au module. Vert = disponible, gris = pas encore finalise.
  </div>
</div>

<div class="modal-backdrop" id="examPreviewModal">
  <div class="modal">
    <div class="modal-accent"></div>
    <div class="modal-header">
      <div class="modal-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div>
        <div class="modal-title" id="examPreviewTitle">Exam preview</div>
        <div class="modal-sub" id="examPreviewSub"></div>
      </div>
      <button class="modal-close" type="button" onclick="closeExamPreview()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="examPreviewBody"></div>
    </div>
    <div class="modal-footer">
      <a id="examPreviewOpenLink" class="export-btn" href="#" target="_blank" rel="noopener">Open exam page</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/assets/js/availability.js"></script>
</body>
</html>
