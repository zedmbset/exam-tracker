<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Disponibles — Exam Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
    color: #1a1a18;
    font-size: 14px;
    line-height: 1.5;
    padding: 24px 16px 48px;
  }

  .page { max-width: 1280px; margin: 0 auto; }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    color: #fff;
  }
  .topbar a.back-link {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    transition: background 0.15s;
  }
  .topbar a.back-link:hover { background: rgba(255,255,255,0.2); }
  .topbar .filters { margin-left: auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .topbar .filters label { font-size: 11px; color: rgba(255,255,255,0.75); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 4px; }
  .topbar .filters select {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.95);
    color: #1a1a18;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    min-width: 140px;
  }
  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.3);
    background: #22c55e;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 4px;
    transition: background 0.15s, opacity 0.15s;
  }
  .export-btn:hover { background: #16a34a; }
  .export-btn:disabled { opacity: 0.6; cursor: wait; }
  .export-btn.pdf { background: #dc2626; }
  .export-btn.pdf:hover { background: #b91c1c; }

  /* Export rendering wrapper — used only during capture */
  .export-render {
    background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
    padding: 28px;
    width: 1280px;
  }
  .export-render .title-banner { margin-bottom: 22px; }

  /* Title banner */
  .title-banner {
    background: #fff;
    border-radius: 40px;
    padding: 14px 26px;
    text-align: center;
    margin: 0 auto 26px;
    max-width: 780px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  }
  .title-banner h1 {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    color: #1e3a8a;
    letter-spacing: -0.01em;
  }

  /* States */
  .state-msg {
    text-align: center;
    color: #fff;
    font-size: 14px;
    padding: 60px 20px;
  }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 20px;
  }
  @media (max-width: 1000px) { .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  @media (max-width: 640px)  { .cards-grid { grid-template-columns: 1fr; } }

  .card {
    background: #f5f5f7;
    border-radius: 14px;
    padding: 16px 16px 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    display: flex;
    flex-direction: column;
    min-height: 170px;
  }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: #1e3a8a;
    text-align: center;
    margin-bottom: 12px;
    font-style: italic;
  }

  /* Years 1-3: simple module list */
  .module-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px 16px;
    font-size: 13px;
  }
  @media (max-width: 420px) { .module-list { grid-template-columns: 1fr; } }
  .module-list.single-col { grid-template-columns: 1fr; }
  .module-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
  }
  .module-item .mod-name { color: #1a1a18; font-weight: 500; }

  /* Checkbox (check/empty) */
  .chk {
    flex-shrink: 0;
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1.5px solid #9a9994;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .chk.on {
    background: #22c55e;
    border-color: #16a34a;
  }
  .chk.on::after {
    content: "";
    display: block;
    width: 5px; height: 10px;
    border: solid #fff;
    border-width: 0 2.5px 2.5px 0;
    transform: translateY(-1px) rotate(45deg);
  }
  a.chk-link {
    text-decoration: none;
    display: inline-flex;
    cursor: pointer;
    border-radius: 4px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  a.chk-link:hover { transform: scale(1.12); box-shadow: 0 0 0 2px rgba(34,197,94,0.35); }
  a.chk-link:focus-visible { outline: 2px solid #1e3a8a; outline-offset: 2px; }

  /* Years 4-6: matrix */
  .matrix-wrap { overflow-x: auto; }
  .matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .matrix th, .matrix td {
    padding: 3px 1px;
    text-align: center;
    vertical-align: middle;
  }
  .matrix th.mod-col, .matrix td.mod-col {
    text-align: left;
    font-size: 12.5px;
    font-weight: 500;
    color: #1a1a18;
    white-space: nowrap;
    padding-right: 6px;
    padding-left: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }
  .matrix thead th { padding: 4px 1px; }
  .col-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 50%;
    color: #fff;
    font-weight: 700;
    font-size: 9px;
    line-height: 1.05;
    text-align: center;
    padding: 0 1px;
    white-space: normal;
  }
  .col-pill.r { background: #7c3aed; }
  .col-pill.e { background: #f97316; font-size: 8.5px; }
  .col-pill.ratt { background: #ea580c; padding: 0 5px; width: auto; min-width: 38px; border-radius: 14px; font-size: 9px; }
  .matrix td .chk { width: 18px; height: 18px; }
  .matrix td .chk.on::after { width: 4px; height: 8px; }

  .empty-card-msg {
    font-size: 12px;
    color: #6b6a65;
    font-style: italic;
    text-align: center;
    padding: 12px 0;
  }

  .footer-note {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
  }

  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
<script src="/vendor/html2canvas.min.js"></script>
<script src="/vendor/jspdf.umd.min.js"></script>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a class="back-link" href="/" title="Retour au tableau de bord">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Tableau de bord
    </a>
    <div class="filters">
      <label for="fYear">Année</label>
      <select id="fYear" onchange="onFilterChange()"></select>
      <label for="fWilaya">Wilaya</label>
      <select id="fWilaya" onchange="onFilterChange()"></select>
      <button type="button" id="exportBtn" class="export-btn" onclick="exportAsImage()" title="Exporter en image PNG">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="exportBtnText">PNG</span>
      </button>
      <button type="button" id="exportPdfBtn" class="export-btn pdf" onclick="exportAsPdf()" title="Exporter en PDF">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="exportPdfBtnText">PDF</span>
      </button>
    </div>
  </div>

  <div class="title-banner">
    <h1 id="pageTitle">QCM — Maintenant Disponibles sur la Plateforme</h1>
  </div>

  <div id="loading" class="state-msg">
    <div class="spinner"></div>
    Chargement des données…
  </div>
  <div id="errorBox" class="state-msg" style="display:none;">
    Impossible de charger les données.
    <div id="errorDetails" style="margin-top:8px;font-size:12px;opacity:0.75;"></div>
  </div>

  <div id="cardsGrid" class="cards-grid" style="display:none;"></div>

  <div class="footer-note">
    Une case cochée signifie que le QCM est disponible sur la plateforme (fichier final chargé).
  </div>
</div>

<script>
// Column indices are resolved dynamically from the header row to stay robust
// against schema drift (the live sheet does not always contain Start/End).
let COLS = {
  ID_Exams:0, Wilaya:1, Year:2, Level:3, Rotation:4, Period:5,
  categoryId:6, Module:7, ExamDate:8, Status:9,
  OrigPDF:10, AffichagePDF:11, Quiz_Tbl:12, Membre:13, Tags:14, Quiz_Link:15,
  Admin_Report:16, Public_Report:17,
};

const HEADER_ALIASES = {
  ID_Exams: ['ID_Exams'],
  Wilaya: ['Wilaya'],
  Year: ['Year'],
  Level: ['Level'],
  Rotation: ['Rotation'],
  Period: ['Period'],
  categoryId: ['categoryId'],
  Module: ['Module'],
  ExamDate: ['ExamDate', 'Exam Date', 'ExamDate '],
  Status: ['Status'],
  OrigPDF: ['OrigPDF', 'Orig_PDF'],
  AffichagePDF: ['AffichagePDF', 'Affichage_PDF'],
  Quiz_Tbl: ['Quiz_Tbl', 'QuizTbl', 'Quiz Table'],
  Membre: ['Membre'],
  Tags: ['Tags'],
  Quiz_Link: ['Quiz_Link', 'QuizLink'],
  Admin_Report: ['Admin_Report'],
  Public_Report: ['Public_Report'],
};

// Headers that must resolve for the page to render correctly. If any of these
// are missing we fail loudly instead of silently using the positional fallback.
const REQUIRED_HEADERS = ['Year', 'Wilaya', 'Level', 'Module', 'Rotation', 'Period', 'Quiz_Tbl'];

function resolveCols(headerRow) {
  const norm = s => String(s || '').trim().toLowerCase();
  const map = {};
  (headerRow || []).forEach((h, i) => { map[norm(h)] = i; });
  const next = {};
  for (const [key, aliases] of Object.entries(HEADER_ALIASES)) {
    for (const a of aliases) {
      const idx = map[norm(a)];
      if (idx !== undefined) { next[key] = idx; break; }
    }
  }
  const missing = REQUIRED_HEADERS.filter(k => next[k] === undefined);
  if (missing.length > 0) {
    const err = new Error('Missing required sheet column(s): ' + missing.join(', '));
    err.code = 'MISSING_COLUMNS';
    throw err;
  }
  return next;
}

// Normalize Rotation/Period cell values for matrix matching: trim + uppercase
// for Rotation (R1/R2/R3), and Title-Case for Period (ECOS, Ratrpg).
function normRotation(v) { return String(v || '').trim().toUpperCase(); }
function normPeriod(v) {
  const s = String(v || '').trim();
  if (!s) return '';
  const up = s.toUpperCase();
  if (up === 'ECOS') return 'ECOS';
  if (up === 'RATRPG' || up === 'RATTRAPAGE') return 'Ratrpg';
  return s;
}

const LEVELS = [
  { key: '1A', label: '1ère Année', matrix: false },
  { key: '2A', label: '2ème Année', matrix: false },
  { key: '3A', label: '3ème Année', matrix: false },
  { key: '4A', label: '4ème Année', matrix: true  },
  { key: '5A', label: '5ème Année', matrix: true  },
  { key: '6A', label: '6ème Année', matrix: true  },
];

// Matrix column definitions for years 4-6.
// `matches(rot, per)` receives already-normalized values from normRotation/normPeriod.
const MATRIX_COLS = [
  { key: 'R1',    label: 'R1',         aria: 'R1',        cls: 'r',    matches: (rot, per) => rot === 'R1' && per !== 'ECOS' && per !== 'Ratrpg' },
  { key: 'R2',    label: 'R2',         aria: 'R2',        cls: 'r',    matches: (rot, per) => rot === 'R2' && per !== 'ECOS' && per !== 'Ratrpg' },
  { key: 'R3',    label: 'R3',         aria: 'R3',        cls: 'r',    matches: (rot, per) => rot === 'R3' && per !== 'ECOS' && per !== 'Ratrpg' },
  { key: 'E1',    label: 'ECOS<br>R1', aria: 'ECOS R1',   cls: 'e',    matches: (rot, per) => rot === 'R1' && per === 'ECOS' },
  { key: 'E2',    label: 'ECOS<br>R2', aria: 'ECOS R2',   cls: 'e',    matches: (rot, per) => rot === 'R2' && per === 'ECOS' },
  { key: 'E3',    label: 'ECOS<br>R3', aria: 'ECOS R3',   cls: 'e',    matches: (rot, per) => rot === 'R3' && per === 'ECOS' },
  { key: 'RATT',  label: 'Ratrpg',     aria: 'Rattrapage',cls: 'ratt', matches: (rot, per) => per === 'Ratrpg' },
];

let allRows = [];
let years = [];
let wilayas = [];

const qs = new URLSearchParams(location.search);

function cell(row, name) {
  const i = COLS[name];
  return row && row[i] !== undefined ? String(row[i] || '').trim() : '';
}
function isPresent(v) { return String(v || '').trim() !== ''; }
function isCompleted(row) { return isPresent(cell(row, 'Quiz_Tbl')); }

// Safe <option> list builder — never use innerHTML for sheet-backed values.
function fillOptions(selectEl, items) {
  selectEl.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (const v of items) {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    frag.appendChild(opt);
  }
  selectEl.appendChild(frag);
}

function chkHtml(on, ariaLabel, examId) {
  const label = ariaLabel ? ` aria-label="${escapeHtml(ariaLabel)}"` : '';
  const state = on ? 'true' : 'false';
  const span = `<span class="chk${on ? ' on' : ''}" role="img" aria-checked="${state}"${label}></span>`;
  if (on && examId) {
    const href = `/exam?id=${encodeURIComponent(examId)}`;
    const linkLabel = ariaLabel ? ` aria-label="${escapeHtml('Ouvrir l\u2019examen : ' + ariaLabel)}"` : '';
    return `<a class="chk-link" href="${href}" target="_blank" rel="noopener"${linkLabel}>${span}</a>`;
  }
  return span;
}

async function loadData() {
  try {
    const res = await fetch('/api/sheet');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const values = data.values || [];
    if (values.length === 0) throw new Error('Sheet is empty');
    COLS = resolveCols(values[0]);
    allRows = values.slice(1).filter(r => isPresent(cell(r, 'Level')));

    // Build filter option lists
    years = [...new Set(allRows.map(r => cell(r, 'Year')).filter(Boolean))].sort((a, b) => b.localeCompare(a));
    wilayas = [...new Set(allRows.map(r => cell(r, 'Wilaya')).filter(Boolean))].sort();

    const fYear = document.getElementById('fYear');
    const fWilaya = document.getElementById('fWilaya');

    fillOptions(fYear, years);
    fillOptions(fWilaya, wilayas);

    // Defaults: URL params → first option
    const urlYear = qs.get('year');
    const urlWilaya = qs.get('wilaya');
    fYear.value = (urlYear && years.includes(urlYear)) ? urlYear : (years[0] || '');
    fWilaya.value = (urlWilaya && wilayas.includes(urlWilaya)) ? urlWilaya : (wilayas[0] || '');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('cardsGrid').style.display = '';
    render();
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const box = document.getElementById('errorBox');
    box.style.display = '';
    document.getElementById('errorDetails').textContent = err.message || String(err);
  }
}

function onFilterChange() {
  const y = document.getElementById('fYear').value;
  const w = document.getElementById('fWilaya').value;
  const params = new URLSearchParams();
  if (y) params.set('year', y);
  if (w) params.set('wilaya', w);
  history.replaceState(null, '', '?' + params.toString());
  render();
}

function render() {
  const year = document.getElementById('fYear').value;
  const wilaya = document.getElementById('fWilaya').value;
  document.getElementById('pageTitle').textContent =
    `QCM ${year || ''} — Maintenant Disponibles sur la Plateforme`.replace(/\s+/g, ' ').trim();

  const scope = allRows.filter(r =>
    cell(r, 'Year') === year && cell(r, 'Wilaya') === wilaya
  );

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = LEVELS.map(lv => renderCard(lv, scope)).join('');
}

function renderCard(level, scope) {
  const rows = scope.filter(r => cell(r, 'Level') === level.key);
  const modules = [...new Set(rows.map(r => cell(r, 'Module')).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, 'fr'));

  let body;
  if (modules.length === 0) {
    body = `<div class="empty-card-msg">Aucun module configuré</div>`;
  } else if (!level.matrix) {
    const useSingleCol = modules.length <= 3;
    const items = modules.map(mod => {
      const doneRow = rows.find(r => cell(r, 'Module') === mod && isCompleted(r));
      const done = !!doneRow;
      const examId = done ? cell(doneRow, 'ID_Exams') : '';
      const aria = `${mod} — ${done ? 'disponible' : 'non disponible'}`;
      return `<div class="module-item">${chkHtml(done, aria, examId)}<span class="mod-name">${escapeHtml(mod)}</span></div>`;
    }).join('');
    body = `<div class="module-list${useSingleCol ? ' single-col' : ''}">${items}</div>`;
  } else {
    const thead = `
      <thead><tr>
        <th class="mod-col" scope="col"><span class="sr-only">Module</span></th>
        ${MATRIX_COLS.map(c => `<th scope="col"><span class="col-pill ${c.cls}" aria-label="${escapeHtml(c.aria)}">${c.label}</span></th>`).join('')}
      </tr></thead>`;
    const tbody = modules.map(mod => {
      const modRows = rows.filter(r => cell(r, 'Module') === mod);
      const cells = MATRIX_COLS.map(c => {
        const doneRow = modRows.find(r => {
          if (!isCompleted(r)) return false;
          return c.matches(normRotation(cell(r, 'Rotation')), normPeriod(cell(r, 'Period')));
        });
        const done = !!doneRow;
        const examId = done ? cell(doneRow, 'ID_Exams') : '';
        return `<td>${chkHtml(done, `${mod} ${c.aria} — ${done ? 'disponible' : 'non disponible'}`, examId)}</td>`;
      }).join('');
      return `<tr><th class="mod-col" scope="row">${escapeHtml(mod)}</th>${cells}</tr>`;
    }).join('');
    body = `<div class="matrix-wrap"><table class="matrix"><caption class="sr-only">${escapeHtml(level.label)} — disponibilité des modules par rotation</caption>${thead}<tbody>${tbody}</tbody></table></div>`;
  }

  return `
    <div class="card">
      <div class="card-title">${level.label}</div>
      ${body}
    </div>`;
}

async function renderExportCanvas() {
  const titleEl = document.getElementById('pageTitle');
  const grid = document.getElementById('cardsGrid');
  if (!grid || grid.style.display === 'none') return null;

  const wrap = document.createElement('div');
  wrap.className = 'export-render';
  wrap.style.position = 'fixed';
  wrap.style.left = '-10000px';
  wrap.style.top = '0';

  const banner = document.createElement('div');
  banner.className = 'title-banner';
  const h1 = document.createElement('h1');
  h1.textContent = titleEl.textContent;
  banner.appendChild(h1);

  const gridClone = grid.cloneNode(true);
  gridClone.style.display = '';

  wrap.appendChild(banner);
  wrap.appendChild(gridClone);
  document.body.appendChild(wrap);

  try {
    const canvas = await html2canvas(wrap, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: wrap.scrollWidth,
      windowHeight: wrap.scrollHeight,
    });
    return canvas;
  } finally {
    document.body.removeChild(wrap);
  }
}

function safeName(s) { return String(s).replace(/[^a-zA-Z0-9_-]+/g, '-'); }

async function exportAsImage() {
  const btn = document.getElementById('exportBtn');
  const btnText = document.getElementById('exportBtnText');
  if (typeof html2canvas !== 'function') {
    alert('Le module d\'export n\'a pas pu être chargé. Vérifiez votre connexion internet.');
    return;
  }
  const year = document.getElementById('fYear').value || 'all';
  const wilaya = document.getElementById('fWilaya').value || 'all';

  btn.disabled = true;
  const originalText = btnText.textContent;
  btnText.textContent = 'Export…';

  try {
    const canvas = await renderExportCanvas();
    if (!canvas) return;
    const filename = `qcm-disponibles_${safeName(year)}_${safeName(wilaya)}.png`;
    canvas.toBlob(blob => {
      if (!blob) { alert('Échec de la génération de l\'image.'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  } catch (err) {
    console.error('Export failed:', err);
    alert('Échec de l\'export: ' + (err && err.message ? err.message : err));
  } finally {
    btn.disabled = false;
    btnText.textContent = originalText;
  }
}

async function exportAsPdf() {
  const btn = document.getElementById('exportPdfBtn');
  const btnText = document.getElementById('exportPdfBtnText');
  const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (typeof html2canvas !== 'function' || typeof jsPDFCtor !== 'function') {
    alert('Le module d\'export PDF n\'a pas pu être chargé. Vérifiez votre connexion internet.');
    return;
  }
  const year = document.getElementById('fYear').value || 'all';
  const wilaya = document.getElementById('fWilaya').value || 'all';

  btn.disabled = true;
  const originalText = btnText.textContent;
  btnText.textContent = 'Export…';

  try {
    const canvas = await renderExportCanvas();
    if (!canvas) return;

    // A4 landscape: 297mm x 210mm. Fit canvas into the page preserving
    // aspect ratio so the six-card grid lands on a single page.
    const pdf = new jsPDFCtor({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 8;
    const maxW = pageW - margin * 2;
    const maxH = pageH - margin * 2;
    const ratio = canvas.width / canvas.height;
    let imgW = maxW;
    let imgH = imgW / ratio;
    if (imgH > maxH) { imgH = maxH; imgW = imgH * ratio; }
    const x = (pageW - imgW) / 2;
    const y = (pageH - imgH) / 2;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    pdf.addImage(dataUrl, 'JPEG', x, y, imgW, imgH, undefined, 'FAST');
    pdf.save(`qcm-disponibles_${safeName(year)}_${safeName(wilaya)}.pdf`);
  } catch (err) {
    console.error('PDF export failed:', err);
    alert('Échec de l\'export PDF: ' + (err && err.message ? err.message : err));
  } finally {
    btn.disabled = false;
    btnText.textContent = originalText;
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[ch]));
}
