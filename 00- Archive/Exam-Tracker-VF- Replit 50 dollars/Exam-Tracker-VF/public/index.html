<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Tracker</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9; --text: #1a1a18;
    --text2: #6b6a65; --text3: #9a9994; --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22); --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --blue-border: #B5D4F4; --green-bg: #EAF3DE; --green-text: #3B6D11;
    --green-border: #C0DD97; --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --amber-border: #FAC775; --red-bg: #FCEBEB; --red-text: #A32D2D;
    --red-border: #F7C1C1; --purple-bg: #EEEDFE; --purple-text: #534AB7;
    --purple-border: #CECBF6; --accent: #185FA5; --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b; --text: #e8e7e1;
      --text2: #9a9994; --text3: #6b6a65; --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2); --blue-bg: #0C447C; --blue-text: #B5D4F4;
      --blue-border: #185FA5; --green-bg: #27500A; --green-text: #C0DD97;
      --green-border: #3B6D11; --amber-bg: #633806; --amber-text: #FAC775;
      --amber-border: #854F0B; --red-bg: #791F1F; --red-text: #F7C1C1;
      --red-border: #A32D2D; --purple-bg: #3C3489; --purple-text: #CECBF6;
      --purple-border: #534AB7;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; line-height: 1.5; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-sub { font-size: 12px; color: var(--text3); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .main { flex: 1; padding: 20px 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* Loading screen */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; color: var(--text2); }
  .loading-screen .spinner-lg { width: 32px; height: 32px; border: 2.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* Error screen */
  .error-screen { max-width: 480px; margin: 60px auto; background: var(--bg); border: 0.5px solid var(--red-border); border-radius: var(--radius-lg); padding: 32px; text-align: center; }
  .error-screen h2 { font-size: 17px; font-weight: 500; color: var(--red-text); margin-bottom: 8px; }
  .error-screen p { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .progress-fill { height: 100%; background: #639922; border-radius: 2px; }

  /* Filters */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filters input, .filters select { padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; }
  .filters input { flex: 1; min-width: 160px; }
  .row-count { font-size: 12px; color: var(--text3); margin-left: auto; }

  /* Table */
  .table-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--bg2); }
  th { padding: 9px 12px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.has-missing:hover td { background: var(--amber-bg); }
  tr.complete:hover td { background: var(--green-bg); cursor: default; }
  tr.has-missing { cursor: pointer; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; border: 0.5px solid; }
  .badge-green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .badge-red { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
  .badge-purple { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }
  .badge-gray { background: var(--bg2); color: var(--text2); border-color: var(--border); }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot-green { background: #639922; } .dot-amber { background: #EF9F27; } .dot-red { background: #E24B4A; }
  .empty-val { color: var(--text3); font-style: italic; font-size: 12px; }
  .link-cell a { color: var(--blue-text); font-size: 12px; text-decoration: none; }
  .link-cell a:hover { text-decoration: underline; }

  /* Buttons */
  .btn { padding: 8px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #0C447C; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--bg3); border-color: var(--border); }
  .btn-danger { border-color: var(--red-border); color: var(--red-text); }
  .btn-danger:hover { background: var(--red-bg); }

  /* Share button */
  .share-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; border: 0.5px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .share-btn:hover { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(3px); z-index: 200; align-items: flex-start; justify-content: center; padding: 32px 16px; overflow-y: auto; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg); border-radius: 14px; border: 0.5px solid var(--border); width: 100%; max-width: 660px; box-shadow: 0 24px 64px rgba(0,0,0,0.18); overflow: hidden; }
  .modal-accent { height: 3px; background: linear-gradient(90deg, var(--accent) 0%, #7C3AED 100%); }
  .modal-header { padding: 20px 22px 16px; display: flex; align-items: flex-start; gap: 14px; }
  .modal-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--blue-bg); border: 0.5px solid var(--blue-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--blue-text); }
  .modal-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .modal-sub-chip { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 1px 8px; font-size: 11px; color: var(--text2); }
  .modal-close { margin-left: auto; background: var(--bg2); border: 0.5px solid var(--border); width: 28px; height: 28px; border-radius: 8px; font-size: 15px; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .modal-close:hover { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .modal-body { padding: 0 22px 8px; }
  .modal-footer { padding: 14px 22px; border-top: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; justify-content: flex-end; background: var(--bg2); }
  .modal-req-note { font-size: 11px; color: var(--text3); margin-right: auto; }
  .modal-req-note span { color: var(--red-text); font-weight: 600; }

  /* Section divider */
  .form-section { margin: 18px 0 12px; }
  .form-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); display: flex; align-items: center; gap: 6px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); margin-bottom: 14px; }

  /* Identity chip row */
  .identity-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 0 4px; }
  .id-chip { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .id-chip-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .id-chip-value { font-weight: 500; color: var(--text); }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-row { display: flex; flex-direction: column; gap: 5px; }
  .form-row label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 4px; }
  .form-row label .req { color: var(--red-text); font-size: 12px; line-height: 1; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 9px 11px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; transition: border-color 0.15s, box-shadow 0.15s; }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
  .form-row input.invalid, .form-row select.invalid { border-color: var(--red-border); box-shadow: 0 0 0 3px rgba(163,45,45,0.1); }
  .field-hint { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .field-error { font-size: 11px; color: var(--red-text); margin-top: 2px; display: none; }
  .form-row .prefilled { font-size: 13px; color: var(--text2); padding: 9px 11px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .form-row textarea { width: 100%; padding: 9px 11px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 12px; font-family: 'SFMono-Regular', Consolas, monospace; resize: vertical; min-height: 110px; transition: border-color 0.15s, box-shadow 0.15s; }
  .form-row textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
  .form-row textarea.invalid { border-color: var(--red-border); box-shadow: 0 0 0 3px rgba(163,45,45,0.1); }
  .file-status { display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: var(--radius); font-size: 12px; margin-top: 6px; }
  .file-status.has-file { background: var(--green-bg); border: 0.5px solid var(--green-border); color: var(--green-text); }
  .file-status.no-file { background: var(--bg2); border: 0.5px solid var(--border); color: var(--text3); }
  .file-status a { color: var(--blue-text); text-decoration: none; font-weight: 500; }
  .file-status a:hover { text-decoration: underline; }

  /* Upload zone */
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--blue-bg); }
  .upload-zone-icon { flex-shrink: 0; width: 36px; height: 36px; border-radius: 8px; background: var(--bg2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .upload-zone .upload-text { min-width: 0; }
  .upload-zone p { font-size: 13px; color: var(--text2); font-weight: 500; }
  .upload-zone span { font-size: 11px; color: var(--text3); display: block; margin-top: 2px; }
  .upload-file-name { font-size: 12px; color: var(--green-text); background: var(--green-bg); border: 0.5px solid var(--green-border); padding: 5px 10px; border-radius: var(--radius); margin-top: 8px; display: none; }

  /* Sync & notifications */
  .sync-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }
  .sync-pill.synced { background: var(--green-bg); color: var(--green-text); }
  .sync-pill.syncing { background: var(--amber-bg); color: var(--amber-text); }
  .sync-pill.error { background: var(--red-bg); color: var(--red-text); }
  .spinner { width: 10px; height: 10px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .notif { position: fixed; bottom: 24px; right: 24px; padding: 12px 16px; border-radius: var(--radius); font-size: 13px; z-index: 500; transform: translateY(80px); opacity: 0; transition: transform 0.25s, opacity 0.25s; max-width: 320px; }
  .notif.show { transform: translateY(0); opacity: 1; }
  .notif.success { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .notif.error { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
  .notif.info { background: var(--blue-bg); color: var(--blue-text); border: 0.5px solid var(--blue-border); }

  @media (max-width: 640px) {
    .main { padding: 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .topbar { padding: 0 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">Exam Tracker</div>
    </div>
    <div class="topbar-sub" id="sheetName"></div>
    <div class="topbar-right">
      <div class="sync-pill synced" id="syncStatus"><span>Ready</span></div>
      <button class="btn btn-sm" onclick="loadSheet()">Refresh</button>
    </div>
  </div>

  <div class="main" id="mainContent">
    <!-- Loading -->
    <div id="loadingScreen" class="loading-screen">
      <div class="spinner-lg"></div>
      <span>Loading exam data…</span>
    </div>
    <!-- Error -->
    <div id="errorScreen" class="error-screen" style="display:none;">
      <h2>Could not connect</h2>
      <p id="errorMsg">Unable to reach the backend server. Please try refreshing the page.</p>
    </div>
    <!-- Dashboard -->
    <div id="dashboard" style="display:none;">
      <div class="stats-row" id="statsRow"></div>
      <div class="filters">
        <input type="text" id="searchBox" placeholder="Search module, wilaya…" oninput="renderTable()">
        <select id="fWilaya" onchange="renderTable()"><option value="">All wilayas</option></select>
        <select id="fYear" onchange="renderTable()"><option value="">All years</option></select>
        <select id="fSemester" onchange="renderTable()"><option value="">All rotations</option></select>
        <select id="fStatus" onchange="renderTable()">
          <option value="">All rows</option>
          <option value="missing">Has missing fields</option>
          <option value="complete">Fully complete</option>
        </select>
        <span class="row-count" id="rowCount"></span>
      </div>
      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Wilaya</th><th>Year</th><th>Rotation</th><th>Module</th>
                <th>Status</th><th>OrigPDF</th><th>Quiz_Tbl</th>
                <th>N° Qst</th><th>Missing</th><th></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Fill modal -->
<div class="modal-backdrop" id="fillModal">
  <div class="modal">
    <div class="modal-accent"></div>
    <div class="modal-header">
      <div class="modal-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <div style="min-width:0;">
        <div class="modal-title" id="modalTitle">Fill missing fields</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <a id="modalOpenLink" href="#" target="_blank"
        style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:0.5px solid var(--border2);border-radius:8px;font-size:12px;font-weight:500;color:var(--text2);text-decoration:none;white-space:nowrap;transition:background 0.15s;"
        onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''"
        title="Open full 7-step workflow">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open
      </a>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div id="formGrid"></div>
    </div>
    <div class="modal-footer">
      <div class="modal-req-note"><span>*</span> Required fields</div>
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" id="saveBtn" onclick="saveRow()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;vertical-align:-1px"><polyline points="20 6 9 17 4 12"/></svg>
        Save to sheet
      </button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = '';  // empty = same origin

const COLS = {
  ID_Exams:0, Wilaya:1, Year:2, Level:3, Rotation:4, Period:5,
  Module:6, Start:7, End:8, ExamDate:9, Status:10,
  OrigPDF:11, Quiz_Tbl:12, Membre:13, Tags:14, Quiz_Link:15,
};
const EXAM_STATUS_OPTIONS  = ['✅ Completed','In Progress','Pending','Not Started'];

// ── Date helpers ─────────────────────────────────────────────────────────────
function toDateInputValue(str) {
  if (!str) return '';
  str = str.trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  const m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) {
    const a = parseInt(m[1]), b = parseInt(m[2]), yr = m[3];
    if (b > 12) return `${yr}-${String(a).padStart(2,'0')}-${String(b).padStart(2,'0')}`;
    if (a > 12) return `${yr}-${String(b).padStart(2,'0')}-${String(a).padStart(2,'0')}`;
    return `${yr}-${String(a).padStart(2,'0')}-${String(b).padStart(2,'0')}`;
  }
  const d = new Date(str);
  if (!isNaN(d)) return d.toISOString().slice(0, 10);
  return '';
}

// ── Annotations parser/serializer ────────────────────────────────────────────
// Syntax: "3m, 7s, 15-17m, 20s"  — m=missing, s=schema/table
function parseAnnotations(str) {
  const missingPos = [], schemaQsts = [];
  if (!str || !str.trim()) return { missingPos, schemaQsts, missingQsts: 0 };
  str.split(',').forEach(part => {
    const m = part.trim().match(/^(\d+)(?:-(\d+))?([ms])$/i);
    if (!m) return;
    const from = parseInt(m[1]), to = m[2] ? parseInt(m[2]) : from;
    const tag = m[3].toLowerCase();
    for (let i = from; i <= to; i++) {
      if (tag === 'm') missingPos.push(i);
      else if (tag === 's') schemaQsts.push(i);
    }
  });
  return { missingPos, schemaQsts, missingQsts: missingPos.length };
}
function annotationsToString(tags) {
  const entries = [];
  (tags.missingPos || []).forEach(p => entries.push({ pos: +p, tag: 'm' }));
  (tags.schemaQsts  || []).forEach(p => entries.push({ pos: +p, tag: 's' }));
  entries.sort((a, b) => a.pos - b.pos);
  return entries.map(e => e.pos + e.tag).join(', ');
}

function tsvToCsv(tsv) {
  return tsv.trim().split('\n').map(line =>
    line.split('\t').map(v => {
      v = v.trim();
      if (v.includes(',') || v.includes('"') || v.includes('\n')) return '"' + v.replace(/"/g, '""') + '"';
      return v;
    }).join(',')
  ).join('\n');
}

function parseRangeInput(str) {
  if (!str || !str.trim()) return [];
  const result = [];
  str.split(',').forEach(part => {
    const m = part.trim().match(/^(\d+)-(\d+)$/);
    if (m) { for (let i=+m[1]; i<=+m[2]; i++) result.push(i); }
    else if (/^\d+$/.test(part.trim())) result.push(parseInt(part.trim(), 10));
  });
  return result;
}

let sheetData    = [];
let headers      = [];
let sheetTab     = 'Sheet1';
let headerRow    = 1;
let activeRowIdx = null;
let pendingFile  = null;

// ── Boot ────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const cfg = await (await fetch(`${API}/api/config`)).json();
    sheetTab  = cfg.sheetTab  || 'Sheet1';
    headerRow = cfg.headerRow || 1;
    document.getElementById('sheetName').textContent = sheetTab;
  } catch(e) { /* config fetch failed, use defaults */ }
  loadSheet();
}

async function loadSheet() {
  setSyncStatus('syncing','Loading…');
  try {
    const data = await (await fetch(`${API}/api/sheet`)).json();
    if (data.error) throw new Error(data.error);
    const rows = data.values || [];
    const hi   = headerRow - 1;
    headers    = rows[hi] || [];
    sheetData  = rows.slice(hi + 1).map((r, i) => {
      while (r.length < headers.length) r.push('');
      return { _rowIndex: hi + 2 + i, cells: r };
    });
    showDashboard();
    setSyncStatus('synced','Synced');
    notify('Data loaded — ' + sheetData.length + ' rows', 'success');
  } catch(e) {
    setSyncStatus('error','Error');
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display   = 'block';
    document.getElementById('errorMsg').textContent = e.message;
  }
}

function showDashboard() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display   = 'none';
  document.getElementById('dashboard').style.display     = 'block';
  populateFilters();
  renderStats();
  renderTable();
}

// ── Column helpers ───────────────────────────────────────────────────────────
function colIdx(name) {
  const i = headers.indexOf(name);
  if (i >= 0) return i;
  for (const [k,v] of Object.entries(COLS)) { if (headers[v] && k===name) return v; }
  return headers.findIndex(h => h && h.toLowerCase().replace(/[\s_]/g,'') === name.toLowerCase().replace(/[\s_]/g,''));
}
function cell(row, n)       { const i=colIdx(n); return i>=0?(row.cells[i]||''):''; }
function setCell(row, n, v) { const i=colIdx(n); if(i>=0){while(row.cells.length<=i)row.cells.push('');row.cells[i]=v;} }

function parseTags(row) {
  let tags = {};
  const raw = cell(row, 'Tags');
  if (raw) { try { tags = JSON.parse(raw); } catch(e) { /* not JSON */ } }
  return tags;
}

function getMissing(row) {
  const tags = parseTags(row);
  const m=[];
  if (!cell(row,'Status'))                              m.push('Status');
  if (!cell(row,'OrigPDF'))                             m.push('OrigPDF');
  if (!cell(row,'Quiz_Tbl'))                            m.push('Quiz_Tbl');
  if (!tags.nQst)                                       m.push('N° Qst');
  return m;
}
function isComplete(row){ return getMissing(row).length===0; }

// ── Stats & filters ──────────────────────────────────────────────────────────
function renderStats() {
  const total   = sheetData.length;
  const done    = sheetData.filter(r=>cell(r,'Status').includes('Completed')).length;
  const hasOrigPDF = sheetData.filter(r=>cell(r,'OrigPDF')).length;
  const hasQuizTbl = sheetData.filter(r=>cell(r,'Quiz_Tbl')).length;
  const pct     = total?Math.round(done/total*100):0;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-label">Total rows</div><div class="stat-val">${total}</div><div class="stat-sub">${[...new Set(sheetData.map(r=>cell(r,'Wilaya')).filter(Boolean))].join(', ')}</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-val">${done}</div><div class="stat-sub" style="color:var(--green-text)">${pct}% done</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    <div class="stat"><div class="stat-label">With OrigPDF</div><div class="stat-val">${hasOrigPDF}</div><div class="stat-sub">${total-hasOrigPDF} missing</div></div>
    <div class="stat"><div class="stat-label">With Quiz_Tbl</div><div class="stat-val">${hasQuizTbl}</div><div class="stat-sub">${total-hasQuizTbl} missing</div></div>`;
}

function populateFilters() {
  const fill=(id,vals)=>{
    const sel=document.getElementById(id);
    while(sel.options.length>1)sel.remove(1);
    vals.forEach(v=>{if(v){const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);}});
  };
  fill('fWilaya',[...new Set(sheetData.map(r=>cell(r,'Wilaya')))].filter(Boolean).sort());
  fill('fYear',[...new Set(sheetData.map(r=>cell(r,'Year')))].filter(Boolean).sort());
  fill('fSemester',[...new Set(sheetData.map(r=>cell(r,'Rotation')))].filter(Boolean).sort());
}

function getFiltered() {
  const q  = document.getElementById('searchBox').value.toLowerCase();
  const fw = document.getElementById('fWilaya').value;
  const fy = document.getElementById('fYear').value;
  const fs = document.getElementById('fSemester').value;
  const fst= document.getElementById('fStatus').value;
  return sheetData.filter(r=>{
    if(q&&!(`${cell(r,'Wilaya')} ${cell(r,'Module')} ${cell(r,'Rotation')} ${cell(r,'Level')}`).toLowerCase().includes(q))return false;
    if(fw&&cell(r,'Wilaya')!==fw)return false;
    if(fy&&cell(r,'Year')!==fy)return false;
    if(fs&&cell(r,'Rotation')!==fs)return false;
    const miss=getMissing(r);
    if(fst==='missing'&&miss.length===0)return false;
    if(fst==='complete'&&miss.length>0)return false;
    return true;
  });
}

function wilayaBadge(w){
  if(!w)return'';
  const c=w.toLowerCase().includes('stf')?'badge-purple':w.toLowerCase().includes('msila')?'badge-blue':'badge-gray';
  return`<span class="badge ${c}">${w}</span>`;
}

function setFile(f){

async function saveRow(){
  if(activeRowIdx===null)return;
  const row=sheetData[activeRowIdx];

  // ── Required field validation ─────────────────────────────────────────────
  const origPDFEl  = document.getElementById('field_OrigPDF');
  const tsvEl      = document.getElementById('tsv_Quiz_Tbl');
  const nQstEl     = document.getElementById('tags_nQst');

  const origPDFOk  = (origPDFEl && origPDFEl.value.trim()) || pendingFile || cell(row,'OrigPDF');
  const quizOk     = (tsvEl && tsvEl.value.trim()) || cell(row,'Quiz_Tbl');
  const nQstOk     = nQstEl && nQstEl.value.trim() && parseInt(nQstEl.value) > 0;

  if(origPDFEl) origPDFEl.classList.toggle('invalid', !origPDFOk);
  if(tsvEl)     tsvEl.classList.toggle('invalid', !quizOk);
  if(nQstEl)    nQstEl.classList.toggle('invalid', !nQstOk);

  if(!origPDFOk || !quizOk || !nQstOk){
    notify('Please fill in all required fields (*)', 'error');
    return;
  }

  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving…';btn.disabled=true;

  // Save OrigPDF if manually pasted URL
  const origPDFVal = origPDFEl && origPDFEl.value.trim();
  if(origPDFVal) setCell(row,'OrigPDF',origPDFVal);

  // TSV → CSV upload for Quiz_Tbl
  const tsvContent = tsvEl && tsvEl.value.trim();
  if(tsvContent){
    try{
      const csvContent = tsvToCsv(tsvContent);
      const csvBlob = new Blob([csvContent], {type:'text/csv'});
      const _prCsv = ((cell(row,'Period')||'') + (cell(row,'Rotation')||'')).replace(/\s+/g,'') || '';
      const baseName = [cell(row,'Wilaya'),cell(row,'Year'),_prCsv||null,cell(row,'Module')]
        .filter(Boolean).join('_').replace(/\s+/g,'_');
      const fname = `${baseName}_QCM_V1.csv`;
      const fd = new FormData();
      fd.append('file', csvBlob, fname);
      fd.append('filename', fname);
      const r = await fetch(`${API}/api/upload`,{method:'POST',body:fd});
      const d = await r.json();
      if(d.error) throw new Error(d.error);
      setCell(row,'Quiz_Tbl',d.url);
      notify('QCM CSV uploaded to Drive ✅','success');
    }catch(e){ notify('CSV upload failed: '+e.message,'error'); }
  }

  // Build and save Tags JSON from all tag fields
  const existingTagsIdx = parseTags(row);
  const annot = parseAnnotations(document.getElementById('tags_annotations')?.value||'');
  const mergedTagsIdx = Object.assign({}, existingTagsIdx, {
    nQst: parseInt(document.getElementById('tags_nQst')?.value||'')||0,
    missingPos: annot.missingPos,
    schemaQsts: annot.schemaQsts,
    hasCT:   document.getElementById('tags_hasCT')?.checked   || false,
    hasCas:  document.getElementById('tags_hasCas')?.checked  || false,
    hasComb: document.getElementById('tags_hasComb')?.checked || false,
  });
  delete mergedTagsIdx.missingQsts;
  setCell(row,'Tags',JSON.stringify(mergedTagsIdx));

  // Save Exam Date
  const examDateEl = document.getElementById('field_ExamDate');
  if(examDateEl && examDateEl.value) setCell(row,'ExamDate',examDateEl.value);

  // Save Quiz Link
  const quizLinkFieldEl = document.getElementById('field_Quiz_Link');
  if(quizLinkFieldEl) setCell(row,'Quiz_Link', quizLinkFieldEl.value.trim());

  const hasCTIdx = document.getElementById('tags_hasCT')?.checked || false;
  const ctSuffixIdx = hasCTIdx ? '_CT' : '';
  const nQstIdx = parseInt(document.getElementById('tags_nQst')?.value||'')||0;
  const annotIdx = parseAnnotations(document.getElementById('tags_annotations')?.value||'');

  if(pendingFile){
    try{
      const _pr = ((cell(row,'Period')||'') + (cell(row,'Rotation')||'')).replace(/\s+/g,'') || '';
      const fname=`${cell(row,'Wilaya')}_${cell(row,'Year')}${_pr?'_'+_pr:''}_${cell(row,'Module')}${ctSuffixIdx}_${nQstIdx}Q_${annotIdx.missingPos.length}miss_V1.pdf`.replace(/\s+/g,'_');
      const fd=new FormData();
      fd.append('file',pendingFile,fname);
      fd.append('filename',fname);
      const r=await fetch(`${API}/api/upload`,{method:'POST',body:fd});
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setCell(row,'OrigPDF',d.url);
      notify('PDF uploaded to Drive ✅','success');
    }catch(e){notify('Drive upload failed: '+e.message,'error');}
  }

  try{
    const r=await fetch(`${API}/api/sheet/${row._rowIndex}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cells:row.cells})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    notify('Row saved successfully ✅','success');
  }catch(e){notify('Sheet write failed: '+e.message,'error');}

  btn.textContent='Save to sheet';btn.disabled=false;
  closeModal();renderStats();renderTable();
}

function closeModal(){
  document.getElementById('fillModal').classList.remove('open');
  activeRowIdx=null;pendingFile=null;
}

// ── Utils ────────────────────────────────────────────────────────────────────
function setSyncStatus(state,label){
  const el=document.getElementById('syncStatus');
  el.className='sync-pill '+state;
  el.innerHTML=state==='syncing'?`<div class="spinner"></div><span>${label}</span>`:`<span>${label}</span>`;
}
function notify(msg,type){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className=`notif ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3500);
}

boot();
</script>
</body>
</html>
