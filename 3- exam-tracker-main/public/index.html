<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Tracker</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9; --text: #1a1a18;
    --text2: #6b6a65; --text3: #9a9994; --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22); --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --blue-border: #B5D4F4; --green-bg: #EAF3DE; --green-text: #3B6D11;
    --green-border: #C0DD97; --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --amber-border: #FAC775; --red-bg: #FCEBEB; --red-text: #A32D2D;
    --red-border: #F7C1C1; --purple-bg: #EEEDFE; --purple-text: #534AB7;
    --purple-border: #CECBF6; --accent: #185FA5; --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b; --text: #e8e7e1;
      --text2: #9a9994; --text3: #6b6a65; --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2); --blue-bg: #0C447C; --blue-text: #B5D4F4;
      --blue-border: #185FA5; --green-bg: #27500A; --green-text: #C0DD97;
      --green-border: #3B6D11; --amber-bg: #633806; --amber-text: #FAC775;
      --amber-border: #854F0B; --red-bg: #791F1F; --red-text: #F7C1C1;
      --red-border: #A32D2D; --purple-bg: #3C3489; --purple-text: #CECBF6;
      --purple-border: #534AB7;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; line-height: 1.5; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-sub { font-size: 12px; color: var(--text3); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .main { flex: 1; padding: 20px 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* Loading screen */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; color: var(--text2); }
  .loading-screen .spinner-lg { width: 32px; height: 32px; border: 2.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* Error screen */
  .error-screen { max-width: 480px; margin: 60px auto; background: var(--bg); border: 0.5px solid var(--red-border); border-radius: var(--radius-lg); padding: 32px; text-align: center; }
  .error-screen h2 { font-size: 17px; font-weight: 500; color: var(--red-text); margin-bottom: 8px; }
  .error-screen p { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .progress-fill { height: 100%; background: #639922; border-radius: 2px; }

  /* Filters */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filters input, .filters select { padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; }
  .filters input { flex: 1; min-width: 160px; }
  .row-count { font-size: 12px; color: var(--text3); margin-left: auto; }

  /* Table */
  .table-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--bg2); }
  th { padding: 9px 12px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.has-missing:hover td { background: var(--amber-bg); }
  tr.complete:hover td { background: var(--green-bg); cursor: default; }
  tr.has-missing { cursor: pointer; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; border: 0.5px solid; }
  .badge-green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .badge-red { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
  .badge-purple { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }
  .badge-gray { background: var(--bg2); color: var(--text2); border-color: var(--border); }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot-green { background: #639922; } .dot-amber { background: #EF9F27; } .dot-red { background: #E24B4A; }
  .empty-val { color: var(--text3); font-style: italic; font-size: 12px; }
  .link-cell a { color: var(--blue-text); font-size: 12px; text-decoration: none; }
  .link-cell a:hover { text-decoration: underline; }

  /* Buttons */
  .btn { padding: 8px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #0C447C; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--bg3); border-color: var(--border); }
  .btn-danger { border-color: var(--red-border); color: var(--red-text); }
  .btn-danger:hover { background: var(--red-bg); }

  /* Share button */
  .share-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; border: 0.5px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .share-btn:hover { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 620px; }
  .modal-header { padding: 18px 20px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
  .modal-title { font-size: 15px; font-weight: 500; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .modal-close { margin-left: auto; background: none; border: none; font-size: 18px; color: var(--text3); cursor: pointer; padding: 2px 6px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; justify-content: flex-end; }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-row { display: flex; flex-direction: column; gap: 5px; }
  .form-row label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(24,95,165,0.15); }
  .form-row .prefilled { font-size: 13px; color: var(--text2); padding: 7px 10px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); }

  /* Upload zone */
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--blue-bg); }
  .upload-zone-icon { font-size: 24px; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--text2); }
  .upload-zone span { font-size: 12px; color: var(--text3); display: block; margin-top: 3px; }
  .upload-file-name { font-size: 12px; color: var(--green-text); background: var(--green-bg); padding: 5px 10px; border-radius: var(--radius); margin-top: 8px; display: none; }

  /* Sync & notifications */
  .sync-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }
  .sync-pill.synced { background: var(--green-bg); color: var(--green-text); }
  .sync-pill.syncing { background: var(--amber-bg); color: var(--amber-text); }
  .sync-pill.error { background: var(--red-bg); color: var(--red-text); }
  .spinner { width: 10px; height: 10px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .notif { position: fixed; bottom: 24px; right: 24px; padding: 12px 16px; border-radius: var(--radius); font-size: 13px; z-index: 500; transform: translateY(80px); opacity: 0; transition: transform 0.25s, opacity 0.25s; max-width: 320px; }
  .notif.show { transform: translateY(0); opacity: 1; }
  .notif.success { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .notif.error { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
  .notif.info { background: var(--blue-bg); color: var(--blue-text); border: 0.5px solid var(--blue-border); }

  @media (max-width: 640px) {
    .main { padding: 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .topbar { padding: 0 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">Exam Tracker</div>
    </div>
    <div class="topbar-sub" id="sheetName"></div>
    <div class="topbar-right">
      <div class="sync-pill synced" id="syncStatus"><span>Ready</span></div>
      <button class="btn btn-sm" onclick="loadSheet()">Refresh</button>
    </div>
  </div>

  <div class="main" id="mainContent">
    <!-- Loading -->
    <div id="loadingScreen" class="loading-screen">
      <div class="spinner-lg"></div>
      <span>Loading exam data…</span>
    </div>
    <!-- Error -->
    <div id="errorScreen" class="error-screen" style="display:none;">
      <h2>Could not connect</h2>
      <p id="errorMsg">Unable to reach the backend server. Please try refreshing the page.</p>
    </div>
    <!-- Dashboard -->
    <div id="dashboard" style="display:none;">
      <div class="stats-row" id="statsRow"></div>
      <div class="filters">
        <input type="text" id="searchBox" placeholder="Search module, wilaya…" oninput="renderTable()">
        <select id="fWilaya" onchange="renderTable()"><option value="">All wilayas</option></select>
        <select id="fYear" onchange="renderTable()"><option value="">All years</option></select>
        <select id="fSemester" onchange="renderTable()"><option value="">All rotations</option></select>
        <select id="fStatus" onchange="renderTable()">
          <option value="">All rows</option>
          <option value="missing">Has missing fields</option>
          <option value="complete">Fully complete</option>
        </select>
        <span class="row-count" id="rowCount"></span>
      </div>
      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Wilaya</th><th>Year</th><th>Rotation</th><th>Module</th>
                <th>Status</th><th>Exam type</th><th>Drive</th><th>Quiz link</th>
                <th>MBset</th><th>N° Qst</th><th>Missing</th><th></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Fill modal -->
<div class="modal-backdrop" id="fillModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Fill missing fields</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid" id="formGrid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm btn-danger" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" id="saveBtn" onclick="saveRow()">Save to sheet</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = '';  // empty = same origin

const COLS = {
  ID_Exams:0, Wilaya:1, Year:2, Level:3, Rotation:4, Module:5,
  Start:6, End:7, ExamDate:8, Status:9, OrgnlExam:10,
  DBTbl:11, Membre:12, Tags:13, Drive:14, QuizLink:15,
  ExamStatus:16, MBsetStatus:17, Mbset:18, NQst:19, MissingQsts:20
};
const EXAM_STATUS_OPTIONS  = ['✅ Completed','In Progress','Pending','Not Started'];
const EXAM_TYPE_OPTIONS    = ['Exam + CT','Exam only','CT only','Other'];
const MBSET_STATUS_OPTIONS = ['Imported','Pending','Not needed'];

let sheetData    = [];
let headers      = [];
let sheetTab     = 'Sheet1';
let headerRow    = 1;
let activeRowIdx = null;
let pendingFile  = null;

// ── Boot ────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const cfg = await (await fetch(`${API}/api/config`)).json();
    sheetTab  = cfg.sheetTab  || 'Sheet1';
    headerRow = cfg.headerRow || 1;
    document.getElementById('sheetName').textContent = sheetTab;
  } catch(e) { /* config fetch failed, use defaults */ }
  loadSheet();
}

async function loadSheet() {
  setSyncStatus('syncing','Loading…');
  try {
    const data = await (await fetch(`${API}/api/sheet`)).json();
    if (data.error) throw new Error(data.error);
    const rows = data.values || [];
    const hi   = headerRow - 1;
    headers    = rows[hi] || [];
    sheetData  = rows.slice(hi + 1).map((r, i) => {
      while (r.length < headers.length) r.push('');
      return { _rowIndex: hi + 2 + i, cells: r };
    });
    showDashboard();
    setSyncStatus('synced','Synced');
    notify('Data loaded — ' + sheetData.length + ' rows', 'success');
  } catch(e) {
    setSyncStatus('error','Error');
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display   = 'block';
    document.getElementById('errorMsg').textContent = e.message;
  }
}

function showDashboard() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display   = 'none';
  document.getElementById('dashboard').style.display     = 'block';
  populateFilters();
  renderStats();
  renderTable();
}

// ── Column helpers ───────────────────────────────────────────────────────────
function colIdx(name) {
  const i = headers.indexOf(name);
  if (i >= 0) return i;
  for (const [k,v] of Object.entries(COLS)) { if (headers[v] && k===name) return v; }
  return headers.findIndex(h => h && h.toLowerCase().replace(/[\s_]/g,'') === name.toLowerCase().replace(/[\s_]/g,''));
}
function cell(row, n)       { const i=colIdx(n); return i>=0?(row.cells[i]||''):''; }
function setCell(row, n, v) { const i=colIdx(n); if(i>=0){while(row.cells.length<=i)row.cells.push('');row.cells[i]=v;} }

function getMissing(row) {
  const m=[];
  if (!cell(row,'Status')&&!cell(row,'Exam Status'))   m.push('Status');
  if (!cell(row,'Drive')&&!cell(row,'Orgnl Exam'))     m.push('Drive');
  if (!cell(row,'Quiz Link'))                           m.push('Quiz Link');
  if (!cell(row,'MBset Status'))                        m.push('MBset Status');
  if (!cell(row,'N° of Qst')&&!cell(row,'NQst'))       m.push('N° Qst');
  return m;
}
function isComplete(row){ return getMissing(row).length===0; }

// ── Stats & filters ──────────────────────────────────────────────────────────
function renderStats() {
  const total   = sheetData.length;
  const done    = sheetData.filter(r=>(cell(r,'Status')||cell(r,'Exam Status')).includes('Completed')).length;
  const hasDrive= sheetData.filter(r=>cell(r,'Drive')||cell(r,'Orgnl Exam')).length;
  const hasMbset= sheetData.filter(r=>(cell(r,'Mbset')||cell(r,'MBset Status')).includes('✅')||cell(r,'MBset Status')==='Imported').length;
  const pct     = total?Math.round(done/total*100):0;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-label">Total rows</div><div class="stat-val">${total}</div><div class="stat-sub">${[...new Set(sheetData.map(r=>cell(r,'Wilaya')).filter(Boolean))].join(', ')}</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-val">${done}</div><div class="stat-sub" style="color:var(--green-text)">${pct}% done</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    <div class="stat"><div class="stat-label">With Drive</div><div class="stat-val">${hasDrive}</div><div class="stat-sub">${total-hasDrive} missing</div></div>
    <div class="stat"><div class="stat-label">MBset imported</div><div class="stat-val">${hasMbset}</div><div class="stat-sub">${total-hasMbset} pending</div></div>`;
}

function populateFilters() {
  const fill=(id,vals)=>{
    const sel=document.getElementById(id);
    while(sel.options.length>1)sel.remove(1);
    vals.forEach(v=>{if(v){const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);}});
  };
  fill('fWilaya',[...new Set(sheetData.map(r=>cell(r,'Wilaya')))].filter(Boolean).sort());
  fill('fYear',[...new Set(sheetData.map(r=>cell(r,'Year')))].filter(Boolean).sort());
  fill('fSemester',[...new Set(sheetData.map(r=>cell(r,'Rotation')))].filter(Boolean).sort());
}

function getFiltered() {
  const q  = document.getElementById('searchBox').value.toLowerCase();
  const fw = document.getElementById('fWilaya').value;
  const fy = document.getElementById('fYear').value;
  const fs = document.getElementById('fSemester').value;
  const fst= document.getElementById('fStatus').value;
  return sheetData.filter(r=>{
    if(q&&!(`${cell(r,'Wilaya')} ${cell(r,'Module')} ${cell(r,'Rotation')} ${cell(r,'Level')}`).toLowerCase().includes(q))return false;
    if(fw&&cell(r,'Wilaya')!==fw)return false;
    if(fy&&cell(r,'Year')!==fy)return false;
    if(fs&&cell(r,'Rotation')!==fs)return false;
    const miss=getMissing(r);
    if(fst==='missing'&&miss.length===0)return false;
    if(fst==='complete'&&miss.length>0)return false;
    return true;
  });
}

function wilayaBadge(w){
  if(!w)return'';
  const c=w.toLowerCase().includes('stf')?'badge-purple':w.toLowerCase().includes('msila')?'badge-blue':'badge-gray';
  return`<span class="badge ${c}">${w}</span>`;
}

function renderTable(){
  const rows=getFiltered();
  document.getElementById('rowCount').textContent=rows.length+' rows';
  const tbody=document.getElementById('tableBody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="12" style="text-align:center;color:var(--text3);padding:2rem;">No rows match filters</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>{
    const missing  = getMissing(r);
    const comp     = missing.length===0;
    const status   = cell(r,'Status')||cell(r,'Exam Status');
    const drive    = cell(r,'Drive')||cell(r,'Orgnl Exam');
    const quiz     = cell(r,'Quiz Link');
    const mbset    = cell(r,'Mbset')||cell(r,'MBset Status');
    const nqst     = cell(r,'N° of Qst')||cell(r,'NQst');
    const examTypeRaw = cell(r,'Exam Status')!==cell(r,'Status')?cell(r,'Exam Status'):'';
    const examType = EXAM_TYPE_OPTIONS.includes(examTypeRaw) ? examTypeRaw : '';
    const dotClass = missing.length===0?'dot-green':missing.length<=2?'dot-amber':'dot-red';
    const missingLabel = comp
      ?`<span style="font-size:11px;color:var(--green-text)">all filled</span>`
      :`<span class="dot ${dotClass}"></span><span style="font-size:12px;color:var(--amber-text)">${missing.length} field${missing.length>1?'s':''}</span>`;
    const idx      = sheetData.indexOf(r);
    const examId   = cell(r,'ID_Exams') || r._rowIndex;
    return`<tr class="${comp?'complete':'has-missing'}" onclick="${comp?'':'openFill('+idx+')'}">
      <td>${wilayaBadge(cell(r,'Wilaya'))}</td>
      <td>${cell(r,'Year')}</td>
      <td>${cell(r,'Rotation')||'<span class="empty-val">—</span>'}</td>
      <td style="max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${cell(r,'Module')}">${cell(r,'Module')}</td>
      <td>${status?`<span class="badge badge-green">done</span>`:`<span class="badge badge-red">empty</span>`}</td>
      <td>${examType?`<span style="font-size:12px;color:var(--text2)">${examType}</span>`:'<span class="empty-val">—</span>'}</td>
      <td>${drive?`<div class="link-cell"><a href="${drive}" target="_blank" onclick="event.stopPropagation()">Drive ↗</a></div>`:'<span class="empty-val">—</span>'}</td>
      <td>${quiz?`<div class="link-cell"><a href="${quiz}" target="_blank" onclick="event.stopPropagation()">Quiz ↗</a></div>`:'<span class="empty-val">—</span>'}</td>
      <td>${mbset&&(mbset.includes('✅')||mbset==='Imported')?`<span class="badge badge-green">imported</span>`:`<span class="badge badge-gray">none</span>`}</td>
      <td style="text-align:center;">${nqst||'<span class="empty-val">—</span>'}</td>
      <td style="white-space:nowrap;">${missingLabel}</td>
      <td onclick="event.stopPropagation()" style="text-align:center;padding:6px 8px;">
        <button class="share-btn" onclick="shareExam('${examId}',event)" title="Copy share link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </td>
    </tr>`;
  }).join('');
}

// ── Share ────────────────────────────────────────────────────────────────────
function shareExam(id, e) {
  if (e) e.stopPropagation();
  // Make sure id is treated as a string
  const safeId = String(id).trim();
  const url = `${location.origin}/exam?id=${encodeURIComponent(safeId)}`;
  navigator.clipboard.writeText(url).then(() => notify('Share link copied! 🔗', 'success'));
}
// ── Fill modal ───────────────────────────────────────────────────────────────
function openFill(idx){
  activeRowIdx=idx; pendingFile=null;
  const row=sheetData[idx];
  const missing=getMissing(row);
  document.getElementById('modalTitle').textContent=cell(row,'Module')+' — '+cell(row,'Wilaya')+' '+cell(row,'Year');
  document.getElementById('modalSub').textContent=(cell(row,'Level')||'')+' · '+(cell(row,'Rotation')||'')+' · '+missing.length+' missing field'+(missing.length!==1?'s':'');
  const grid=document.getElementById('formGrid');
  grid.innerHTML='';

  const addPrefilled=(label,val)=>{
    if(!val)return;
    const div=document.createElement('div');div.className='form-row';
    div.innerHTML=`<label>${label}</label><div class="prefilled">${val}</div>`;
    grid.appendChild(div);
  };
  const addField=(colName,label,type,options)=>{
    const div=document.createElement('div');div.className='form-row';
    const current=cell(row,colName);
    let input;
    if(type==='select') input=`<select id="field_${colName}"><option value="">— select —</option>${options.map(o=>`<option value="${o}"${current===o?' selected':''}>${o}</option>`).join('')}</select>`;
    else if(type==='url') input=`<input type="url" id="field_${colName}" value="${current}" placeholder="https://…">`;
    else if(type==='number') input=`<input type="number" id="field_${colName}" value="${current}" min="0">`;
    else input=`<input type="text" id="field_${colName}" value="${current}" placeholder="${label}">`;
    div.innerHTML=`<label>${label}</label>${input}`;
    grid.appendChild(div);
  };

  addPrefilled('Wilaya',cell(row,'Wilaya'));
  addPrefilled('Module',cell(row,'Module'));
  addPrefilled('Rotation',cell(row,'Rotation'));

  // PDF upload
  const uploadDiv=document.createElement('div');uploadDiv.className='form-row full';
  uploadDiv.innerHTML=`
    <label>Upload exam PDF to Drive</label>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event)">
      <div class="upload-zone-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p>Click or drag & drop exam PDF</p><span>PDF, max 20MB</span>
      <div class="upload-file-name" id="uploadFileName"></div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFileSelect(this)">
    ${cell(row,'Drive')||cell(row,'Orgnl Exam')?`<div style="margin-top:6px;font-size:12px;color:var(--text2)">Current: <a href="${cell(row,'Drive')||cell(row,'Orgnl Exam')}" target="_blank" style="color:var(--blue-text)">View existing file ↗</a></div>`:''}`;
  grid.appendChild(uploadDiv);

  addField('Status','Exam status','select',EXAM_STATUS_OPTIONS);
  addField('Exam Status','Exam type','select',EXAM_TYPE_OPTIONS);
  addField('Quiz Link','Quiz link (MBset)','url');
  addField('MBset Status','MBset status','select',MBSET_STATUS_OPTIONS);
  addField('Mbset','MBset label','text');
  addField('N° of Qst','Number of questions','number');
  addField('Missing Qsts','Missing questions','number');

  document.getElementById('fillModal').classList.add('open');
}

function handleFileSelect(input){ if(input.files[0])setFile(input.files[0]); }
function handleDrop(e){
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
  if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);
}
function setFile(f){
  pendingFile=f;
  const el=document.getElementById('uploadFileName');
  el.textContent=f.name+' ('+Math.round(f.size/1024)+' KB)';
  el.style.display='block';
}

async function saveRow(){
  if(activeRowIdx===null)return;
  const row=sheetData[activeRowIdx];
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving…';btn.disabled=true;

  [['Status'],['Exam Status'],['Quiz Link'],['MBset Status'],['Mbset'],['N° of Qst'],['Missing Qsts']].forEach(([col])=>{
    const el=document.getElementById('field_'+col);
    if(el)setCell(row,col,el.value);
  });

  if(pendingFile){
    try{
      const fname=`${cell(row,'Wilaya')}_${cell(row,'Year')}_${cell(row,'Rotation')}_${cell(row,'Module')}.pdf`.replace(/\s+/g,'_');
      const fd=new FormData();
      fd.append('file',pendingFile,fname);
      fd.append('filename',fname);
      const r=await fetch(`${API}/api/upload`,{method:'POST',body:fd});
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setCell(row,'Orgnl Exam',d.url);
      notify('PDF uploaded to Drive ✅','success');
    }catch(e){notify('Drive upload failed: '+e.message,'error');}
  }

  try{
    const r=await fetch(`${API}/api/sheet/${row._rowIndex}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cells:row.cells})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    notify('Row saved successfully ✅','success');
  }catch(e){notify('Sheet write failed: '+e.message,'error');}

  btn.textContent='Save to sheet';btn.disabled=false;
  closeModal();renderStats();renderTable();
}

function closeModal(){
  document.getElementById('fillModal').classList.remove('open');
  activeRowIdx=null;pendingFile=null;
}

// ── Utils ────────────────────────────────────────────────────────────────────
function setSyncStatus(state,label){
  const el=document.getElementById('syncStatus');
  el.className='sync-pill '+state;
  el.innerHTML=state==='syncing'?`<div class="spinner"></div><span>${label}</span>`:`<span>${label}</span>`;
}
function notify(msg,type){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className=`notif ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3500);
}

boot();
</script>
