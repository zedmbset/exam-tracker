name: Generate Context File

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate context.txt
        run: |
          find . -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" -o -name "*.json" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.github/*" \
            -exec echo "=== {} ===" \; -exec cat {} \; > context.txt

      - name: Commit context.txt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add context.txt
          git commit -m "Auto-update context.txt" || echo "No changes"
          git push
